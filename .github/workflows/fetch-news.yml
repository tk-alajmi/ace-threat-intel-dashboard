# ACE Threat Intelligence Dashboard - Automated News Fetcher
# This workflow runs on a schedule to fetch cybersecurity news,
# process it with AI, and update the dashboard data.

name: Fetch Threat Intelligence

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no new articles'
        required: false
        default: 'false'
        type: boolean

# Permissions needed to push changes
permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser openai requests

      - name: Run news fetcher
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_news.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in news.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in news.json"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json
          git commit -m "🔄 Update threat intelligence data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Summary
        run: |
          echo "## Threat Intelligence Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -f data/news.json ]; then
            THREAT_COUNT=$(python -c "import json; data=json.load(open('data/news.json')); print(len(data.get('threats', [])))")
            echo "- **Threats Processed:** $THREAT_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Workflow completed successfully" >> $GITHUB_STEP_SUMMARY
